# Batch Connect app configuration file
#
# @note Used to define the submitted cluster, title, description, and
#   hard-coded/user-defined attributes that make up this Batch Connect app.
---

# **MUST** set cluster id here that matches cluster configuration file located
# under /etc/ood/config/clusters.d/*.yml
# NOTE: must match the cluster id in ERIS Nucleus's /etc/ood/config/clusters.d/*.yml
cluster: "nucleus"

# Define attribute values that aren't meant to be modified by the user within
# the Dashboard form
attributes:
  modules: ""

  # Any extra command line arguments to feed to `cellxgene launch ...`
  extra_cellxgene_args: ""

  queue:
    widget: "select"
    label: "Partition"
    help: "ERIS Nucleus SLURM partition. Wall-time limits differ per partition."
    options:
      - [ "normal (1 day, default)",   "normal" ]
      - [ "bigmem (2 days, ~1TB RAM)", "bigmem" ]
      - [ "long (7 days)",             "long" ]
      - [ "short (3 hours)",           "short" ]
      - [ "interactive (12 hours)",    "interactive" ]
  num_cores:
    widget: "number_field"
    label: "Number of cores"
    value: 1
    help: "Max cores per node: 96 (normal). Check `sinfo` for other partitions."
    min: 1
    step: 1
  memory:
    value: 8
    step: 4
    help: "Requested memory (GB)"
  num_hours:
    value: 1
    min: 1
    step: 1
    help: "Wall time in hours (must fit the chosen partition's limit)."
  cellxgene_binary:
    label: cellxgene Binary
    help: "Path to the cellxgene executable (a conda env under /data/vazquez), or just 'cellxgene' if on PATH."
    value: '/data/vazquez/users/iv064/software/miniforge3/envs/cellxgene_env/bin/cellxgene'
  anndata_file:
    label: "Dataset (.h5ad)"
    widget: "text_field"
    help: "Full path to the AnnData .h5ad file to visualize (e.g. /data/vazquez/users/<user>/data/example.h5ad)."
    value: ''

# All of the attributes that make up the Dashboard form (in respective order)
form:
  - modules
  - extra_cellxgene_args
  - queue
  - num_cores
  - num_hours
  - memory
  - cellxgene_binary
  - anndata_file
